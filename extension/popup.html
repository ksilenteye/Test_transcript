<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Meet Transcript</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 12px;
        min-width: 220px;
        color: #1a1a1a;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 8px;
        font-weight: 600;
      }
      label {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        font-size: 13px;
      }
      p {
        font-size: 12px;
        color: #555;
        margin: 10px 0 0;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <h1>Meet Transcript</h1>
    <label>
      <input type="checkbox" id="enabled" />
      Stream captions to API
    </label>
    <p>Enable live captions in Meet. Data posts to <code>http://localhost:8000/transcript</code>.</p>
    <script src="popup.js"></script>
  </body>
</html>
